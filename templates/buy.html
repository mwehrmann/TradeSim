{% extends "layout.html" %}

{% block title %}
    Buy Shares
{% endblock %}

{% block main %}

    <form action="/buy" method="post">
        <div class="mb-3">
            <input autocomplete="off" autofocus class="form-control mx-auto w-25" name="symbol" placeholder="Stock symbol" type="text">
        </div>
        <div class="mb-3">
            <input autocomplete="off" class="form-control mx-auto w-25" name="shares" placeholder="Amount" type="text">
        </div>
        <div class="mb-3">
            <button class="btn btn-primary w-25" type="submit">Buy</button>
        </div>
    </form>
{% endblock %}
